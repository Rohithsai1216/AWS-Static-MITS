version: 0.2

phases:
  install:
    commands:
      - echo "Starting deployment process..."

  pre_build:
    commands:
      - echo "Checking website files..."
      - ls -la

  build:
    commands:
      - echo "Deploying website files to Amazon S3..."
      - aws s3 sync . s3://$S3_BUCKET_NAME --delete --exclude ".git/*" --exclude ".github/*" --exclude "buildspec.yml" --exclude "README.md"

  post_build:
    commands:
      - echo "Creating CloudFront cache invalidation..."
      - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
      - echo "Deployment completed successfully!"